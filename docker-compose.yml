services:
  postgres:
    image: postgres:16-alpine
    container_name: chatbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot
    ports:
      - "5433:5432"
    volumes:
      - /vol1/1000/SoftDisk/docker/postgres:/var/lib/postgresql/data

  mysql:
    image: mysql:latest
    container_name: chatbot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: chatbot
      MYSQL_DATABASE: chatbot
      MYSQL_USER: chatbot
      MYSQL_PASSWORD: chatbot
    ports:
      - "3306:3306"
    volumes:
      - /vol1/1000/SoftDisk/docker/mysql:/var/lib/mysql

  milvus:
    image: milvusdb/milvus:v2.5.27
    container_name: chatbot-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
      MILVUS_GC_ENABLED: "false"
      DEPLOY_MODE: standalone
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  milvus-data:
